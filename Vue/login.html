<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- 
        CONTENEUR PRINCIPAL DE LA PAGE DE CONNEXION
        Utilise une structure flexbox pour diviser la page en deux parties :
        - Une partie gauche avec une illustration
        - Une partie droite avec le formulaire de connexion
    -->
    <div class="login-container">
        
        <!-- 
            SECTION ILLUSTRATION (PARTIE GAUCHE)
            Affiche une image décorative avec un fond en dégradé
            Sert à rendre l'interface plus attrayante visuellement
        -->
        <div class="illustration">
            <div class="login-mark" aria-hidden="true">
                <i class="fas fa-film"></i>
            </div>
        </div>
        
        <!-- 
            SECTION FORMULAIRE DE CONNEXION (PARTIE DROITE)
            Contient tous les éléments du formulaire de connexion :
            - Titre de bienvenue
            - Champs email et mot de passe
            - Bouton de soumission
            - Lien vers la page d'inscription
        -->
        <div class="login-form">
            <h2>Bienvenue sur le Terrain</h2>
            
            <!-- 
                FORMULAIRE DE CONNEXION
                Méthode POST pour sécuriser les données lors de l'envoi
                Action vers login.php qui traite l'authentification côté serveur
            -->
            <form method="post" action="../login.php">
                
                <!-- 
                    CHAMP EMAIL
                    Groupe contenant le label et l'input pour l'adresse email
                    Type "text" permet la saisie libre (pourrait être "email" pour validation HTML5)
                -->
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="text" name="email" id="email" placeholder="Entrez votre email">
                </div>
                
                <!-- 
                    CHAMP MOT DE PASSE
                    Type "password" masque automatiquement les caractères saisis
                    Classe supplémentaire "password-group" pour un style spécifique si besoin
                -->
                <div class="input-group password-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" name="password" id="password" placeholder="Entrez votre mot de passe">
                </div>
                
                <button type="submit" name="Connexion">Connexion</button> 
                <!--//envoi du formulaire-->
                
                <!-- 
                    LIEN VERS L'INSCRIPTION
                    Permet aux nouveaux utilisateurs de créer un compte
                    Redirige vers la page signup.php
                -->
                <div class="signup">
                    <p>Pas encore de compte ? <a href="../signup.php">Inscrivez-vous ici</a></p>
                </div>

            </form>
        </div>
    </div>
</body>
</html>
