<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="stylesheet" href="css/login.css"> <!-- !!!! CREER UN CSS POUR LA PAGE LOGIN !!!! -->
</head>
<body>
    <!-- 
        CONTENEUR PRINCIPAL DE LA PAGE DE CONNEXION
        Utilise une structure flexbox pour diviser la page en deux parties :
        - Une partie gauche avec une illustration
        - Une partie droite avec le formulaire de connexion
    -->
    <div class="login-container">
        
        <!-- 
            SECTION ILLUSTRATION (PARTIE GAUCHE)
            Affiche une image décorative avec un fond en dégradé
            Sert à rendre l'interface plus attrayante visuellement
        -->
        <div class="illustration">
            <img src="../img/batman_001.png" alt="Illustration" width="100">
            
        </div>
        
        <!-- 
            SECTION FORMULAIRE DE CONNEXION (PARTIE DROITE)
            Contient tous les éléments du formulaire de connexion :
            - Titre de bienvenue
            - Champs email et mot de passe
            - Bouton de soumission
            - Lien vers la page d'inscription
        -->
        <div class="login-form">
            <h2>Bienvenue sur le Terrain</h2>
            
            <!-- 
                FORMULAIRE DE CONNEXION
                Méthode POST pour sécuriser les données lors de l'envoi
                Action vers login.php qui traite l'authentification côté serveur
            -->
            <form method="post" action="../login.php">
                
                <!-- 
                    CHAMP EMAIL
                    Groupe contenant le label et l'input pour l'adresse email
                    Type "text" permet la saisie libre (pourrait être "email" pour validation HTML5)
                -->
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="text" name="email" id="email" placeholder="Entrez votre email">
                </div>
                
                <!-- 
                    CHAMP MOT DE PASSE
                    Type "password" masque automatiquement les caractères saisis
                    Classe supplémentaire "password-group" pour un style spécifique si besoin
                -->
                <div class="input-group password-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" name="password" id="password" placeholder="Entrez votre mot de passe">
                </div>
                
                <button type="submit" name="Connexion">Connexion</button> 
                <!--//envoi du formulaire-->
                
                <!-- 
                    LIEN VERS L'INSCRIPTION
                    Permet aux nouveaux utilisateurs de créer un compte
                    Redirige vers la page signup.php
                -->
                <div class="signup">
                    <p>Pas encore de compte ? <a href="../signup.php">Inscrivez-vous ici</a></p>
                </div>

            </form>
        </div>
    </div>
</body>
</html>

<style>
    /* 
        ========================================
        STYLES GÉNÉRAUX DU BODY
        ========================================
        Configuration de base pour centrer le contenu sur toute la page
        Utilise flexbox pour un centrage vertical et horizontal parfait
    */
    body {
        font-family: 'Arial', sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;  /* Centrage horizontal */
        align-items: center;      /* Centrage vertical */
        height: 100vh;            /* Hauteur pleine écran */
        margin: 0;
    }


    .login-container {
        display: flex;
        background: white;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);  /* Ombre portée douce */
        border-radius: 10px;
        overflow: hidden;  /* Cache les débordements pour les coins arrondis */
        width: 800px;
        max-width: 90%;    /* Responsive : s'adapte aux petits écrans */
    }

    .illustration {
        background: linear-gradient(135deg, #6a11cb, #2575fc);  /* Dégradé diagonal */
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 30px;
        flex: 1;  /* Prend la moitié de l'espace disponible */
    }

    /* 
        STYLE DE L'IMAGE D'ILLUSTRATION
        Limite la taille de l'image pour qu'elle reste proportionnelle
        Maintient le ratio d'aspect avec height: auto
    */
    .illustration img {
        max-width: 100%;
        width: 100px;
        height: auto;
    }


    .login-form {
        flex: 1;
        padding: 40px;
        text-align: center;
        height: 350px;   
    }

    /* 
        TITRE DU FORMULAIRE
        Style du texte "Bienvenue sur le Terrain"
    */
    h2 {
        margin-bottom: 20px;
        font-size: 24px;
        color: #333;
    }

    .input-group {
        text-align: left;
        margin-bottom: 15px;
    }


    .input-group label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
    }


    .input-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
    }

  
    .password-group {
        position: relative;
    }


    .toggle-password {
        position: absolute;
        right: 10px;
    }


    .options {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        margin-bottom: 20px;
    }


    button {
        width: 100%;
        padding: 10px;
        background-color: #333;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;  /* Animation douce pour le hover */
    }

    /* 
        EFFET HOVER DU BOUTON
        Éclaircit légèrement le fond au survol de la souris
    */
    button:hover {
        background-color: #555;
    }

    /* 
        ========================================
        BOUTON CONNEXION GOOGLE (NON UTILISÉ)
        ========================================
        Style prévu pour un bouton de connexion via Google
        Fond blanc avec bordure pour se différencier du bouton principal
    */
    .google-login {
        margin-top: 10px;
        background-color: #fff;
        color: #333;
        border: 1px solid #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
    }

    .google-login:hover {
        background-color: #f0f0f0;
    }

    /* 
        MESSAGE D'ERREUR (NON UTILISÉ ACTUELLEMENT)
        Style pour afficher les erreurs de connexion (identifiants incorrects, etc.)
    */
    .error-message {
        color: red;
        margin-top: 10px;
    }

    /* 
        ========================================
        SECTION INSCRIPTION
        ========================================
        Lien vers la page d'inscription pour les nouveaux utilisateurs
        Placé en bas du formulaire avec un style discret
    */
    .signup {
        margin-top: 20px;
        font-size: 14px;
    }

    /* 
        LIEN D'INSCRIPTION
        Style bleu standard pour les liens avec soulignement au survol
    */
    .signup a {
        color: #007bff;
        text-decoration: none;
    }

    .signup a:hover {
        text-decoration: underline;
    }

</style>
