<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Filmogram</title>
    <meta name="description" content="Connectez-vous à Filmogram en tant qu'utilisateur ou administrateur.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <!-- 
        ÉCRAN DE SÉLECTION DU RÔLE
        L'utilisateur choisit entre "Utilisateur" et "Administrateur"
        avant d'accéder au formulaire de connexion correspondant.
    -->
    <div class="role-selector" id="roleSelector">
        <div class="role-selector-card">
            <div class="role-header">
                <div class="role-logo-icon" aria-hidden="true">
                    <i class="fas fa-film"></i>
                </div>
                <h1 class="role-title">FILMOGRAM</h1>
                <p class="role-subtitle">Choisissez votre mode de connexion</p>
            </div>

            <div class="role-options">
                <!-- Choix Utilisateur -->
                <button class="role-card" id="btnUser" onclick="selectRole('user')" type="button">
                    <div class="role-card-icon user-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <h3>Utilisateur</h3>
                    <p>Accédez à votre espace personnel, explorez les films et gérez vos favoris.</p>
                    <span class="role-card-arrow"><i class="fas fa-arrow-right"></i></span>
                </button>

                <!-- Choix Administrateur -->
                <button class="role-card" id="btnAdmin" onclick="selectRole('admin')" type="button">
                    <div class="role-card-icon admin-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <h3>Administrateur</h3>
                    <p>Gérez les films, les utilisateurs et le contenu du site.</p>
                    <span class="role-card-arrow"><i class="fas fa-arrow-right"></i></span>
                </button>
            </div>
        </div>
    </div>

    <!-- 
        CONTENEUR PRINCIPAL DE LA PAGE DE CONNEXION UTILISATEUR
        Caché par défaut, affiché après le choix du rôle "Utilisateur"
    -->
    <div class="login-container" id="loginContainer" style="display:none;">

        <!-- SECTION ILLUSTRATION (PARTIE GAUCHE) -->
        <div class="illustration">
            <div class="login-mark" aria-hidden="true">
                <i class="fas fa-film"></i>
            </div>
        </div>

        <!-- SECTION FORMULAIRE DE CONNEXION (PARTIE DROITE) -->
        <div class="login-form">
            <button class="back-to-role" onclick="goBackToRole()" type="button" aria-label="Retour au choix du rôle">
                <i class="fas fa-arrow-left"></i> Retour
            </button>

            <h2>Bienvenue sur le Terrain</h2>

            <!-- FORMULAIRE DE CONNEXION UTILISATEUR -->
            <form method="post" action="../login.php">

                <!-- CHAMP EMAIL -->
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="text" name="email" id="email" placeholder="Entrez votre email">
                </div>

                <!-- CHAMP MOT DE PASSE -->
                <div class="input-group password-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" name="password" id="password" placeholder="Entrez votre mot de passe">
                </div>

                <button type="submit" name="Connexion">Connexion</button>

                <!-- LIEN VERS L'INSCRIPTION -->
                <div class="signup">
                    <p>Pas encore de compte ? <a href="../signup.php">Inscrivez-vous ici</a></p>
                </div>

            </form>
        </div>
    </div>

    <script>
        /**
         * Gère la sélection du rôle de connexion.
         * - "user"  → affiche le formulaire utilisateur sur cette page
         * - "admin" → redirige vers la page de connexion admin
         */
        function selectRole(role) {
            if (role === 'admin') {
                // Redirige vers la page de connexion admin
                window.location.href = '../admin/admin_login.php';
            } else {
                // Animation de transition vers le formulaire utilisateur
                const selector = document.getElementById('roleSelector');
                const container = document.getElementById('loginContainer');

                selector.classList.add('fade-out');
                setTimeout(() => {
                    selector.style.display = 'none';
                    container.style.display = 'flex';
                    // Déclenche l'animation d'apparition
                    requestAnimationFrame(() => {
                        container.classList.add('fade-in');
                    });
                }, 350);
            }
        }

        /**
         * Retour à l'écran de sélection du rôle
         */
        function goBackToRole() {
            const selector = document.getElementById('roleSelector');
            const container = document.getElementById('loginContainer');

            container.classList.remove('fade-in');
            container.classList.add('fade-out');
            setTimeout(() => {
                container.style.display = 'none';
                container.classList.remove('fade-out');
                selector.style.display = 'flex';
                selector.classList.remove('fade-out');
                // Déclenche l'animation d'apparition
                requestAnimationFrame(() => {
                    selector.classList.add('fade-in');
                    setTimeout(() => selector.classList.remove('fade-in'), 500);
                });
            }, 350);
        }

        /**
         * Gestion des paramètres URL au chargement de la page :
         * - ?login_error=...  → affiche l'erreur dans le formulaire utilisateur
         * - ?require_login=1  → affiche une popup "Veuillez vous connecter"
         */
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);

            // ── Erreur de connexion ─────────────────────────────────────────
            const loginError = params.get('login_error');
            if (loginError) {
                // Afficher directement le formulaire utilisateur
                selectRole('user');

                // Injecter le message d'erreur dans le formulaire
                const form = document.querySelector('#loginContainer form');
                if (form) {
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'login-error-msg';
                    errorDiv.style.cssText = 'color:#ff6b6b;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:14px;text-align:center;';
                    errorDiv.textContent = decodeURIComponent(loginError);
                    const submitBtn = form.querySelector('button[type="submit"]');
                    if (submitBtn) form.insertBefore(errorDiv, submitBtn);
                }

                // Nettoyer l'URL sans recharger la page
                history.replaceState(null, '', window.location.pathname);
            }

            // ── Popup "Veuillez vous connecter" ────────────────────────────
            if (params.has('require_login')) {
                const popup = document.createElement('div');
                popup.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#667eea;color:white;padding:1rem 1.5rem;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.25);z-index:9999;font-weight:600;animation:slideDown 0.3s ease;';
                popup.textContent = 'Veuillez vous connecter pour continuer';
                document.body.appendChild(popup);

                // Ajouter le keyframe slideDown s'il n'existe pas
                if (!document.getElementById('slideDownKF')) {
                    const style = document.createElement('style');
                    style.id = 'slideDownKF';
                    style.textContent = '@keyframes slideDown{from{opacity:0;top:-50px}to{opacity:1;top:20px}}';
                    document.head.appendChild(style);
                }

                setTimeout(() => popup.remove(), 4000);

                // Nettoyer l'URL
                history.replaceState(null, '', window.location.pathname);
            }
        });
    </script>

</body>

</html>
